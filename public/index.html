<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LibroVoz</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/scanner.css">
  <link rel="stylesheet" href="/css/player.css">
  <link rel="stylesheet" href="/css/library.css">
  <link rel="stylesheet" href="/css/paywall.css">
  <link rel="stylesheet" href="/css/chat.css">
</head>
<body>
  <div id="app">
    <div class="landing">
      <div class="landing-content fade-in">

        <!-- Mascota: pajarito pixel-art -->
        <button class="landing-bird" id="landing-bird" aria-label="Saludar al pájaro" onclick="this.classList.remove('bird-flap');void this.offsetWidth;this.classList.add('bird-flap');">
          <svg class="landing-bird-svg" viewBox="0 0 128 128" width="128" height="128" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
            <!-- Cuerpo principal (filas pixel-art, cada rect = 8x8) -->
            <!-- Fila 1 (y=16): cabecita -->
            <rect x="40" y="16" width="8" height="8" fill="#8BA3B8"/>
            <rect x="48" y="16" width="8" height="8" fill="#A8BCD0"/>
            <rect x="56" y="16" width="8" height="8" fill="#8BA3B8"/>
            <rect x="64" y="16" width="8" height="8" fill="#8BA3B8"/>
            <!-- Fila 2 (y=24) -->
            <rect x="32" y="24" width="8" height="8" fill="#8BA3B8"/>
            <rect x="40" y="24" width="8" height="8" fill="#A8BCD0"/>
            <rect x="48" y="24" width="8" height="8" fill="#A8BCD0"/>
            <rect x="56" y="24" width="8" height="8" fill="#8BA3B8"/>
            <rect x="64" y="24" width="8" height="8" fill="#8BA3B8"/>
            <rect x="72" y="24" width="8" height="8" fill="#6B8294"/>
            <!-- Fila 3 (y=32): ojos -->
            <rect x="24" y="32" width="8" height="8" fill="#8BA3B8"/>
            <rect x="32" y="32" width="8" height="8" fill="#A8BCD0"/>
            <rect class="bird-eye" x="40" y="32" width="8" height="8" fill="#FFFFFF"/>
            <rect class="bird-eye-pupil" x="48" y="32" width="8" height="8" fill="#181C26"/>
            <rect x="56" y="32" width="8" height="8" fill="#8BA3B8"/>
            <rect class="bird-eye" x="64" y="32" width="8" height="8" fill="#FFFFFF"/>
            <rect class="bird-eye-pupil" x="72" y="32" width="8" height="8" fill="#181C26"/>
            <rect x="80" y="32" width="8" height="8" fill="#6B8294"/>
            <!-- Fila 4 (y=40): pico -->
            <rect x="24" y="40" width="8" height="8" fill="#8BA3B8"/>
            <rect x="32" y="40" width="8" height="8" fill="#A8BCD0"/>
            <rect x="40" y="40" width="8" height="8" fill="#8BA3B8"/>
            <rect x="48" y="40" width="8" height="8" fill="#8BA3B8"/>
            <rect x="56" y="40" width="8" height="8" fill="#C9A86A"/>
            <rect x="64" y="40" width="8" height="8" fill="#C9A86A"/>
            <rect x="72" y="40" width="8" height="8" fill="#8BA3B8"/>
            <rect x="80" y="40" width="8" height="8" fill="#6B8294"/>
            <!-- Fila 5 (y=48) -->
            <rect x="24" y="48" width="8" height="8" fill="#8BA3B8"/>
            <rect x="32" y="48" width="8" height="8" fill="#E8E2D5"/>
            <rect x="40" y="48" width="8" height="8" fill="#E8E2D5"/>
            <rect x="48" y="48" width="8" height="8" fill="#E8E2D5"/>
            <rect x="56" y="48" width="8" height="8" fill="#E8E2D5"/>
            <rect x="64" y="48" width="8" height="8" fill="#8BA3B8"/>
            <rect x="72" y="48" width="8" height="8" fill="#6B8294"/>
            <rect x="80" y="48" width="8" height="8" fill="#6B8294"/>
            <!-- Fila 6 (y=56): ala -->
            <rect class="bird-wing" x="16" y="56" width="8" height="8" fill="#6B8294"/>
            <rect class="bird-wing" x="24" y="56" width="8" height="8" fill="#8BA3B8"/>
            <rect x="32" y="56" width="8" height="8" fill="#E8E2D5"/>
            <rect x="40" y="56" width="8" height="8" fill="#E8E2D5"/>
            <rect x="48" y="56" width="8" height="8" fill="#E8E2D5"/>
            <rect x="56" y="56" width="8" height="8" fill="#E8E2D5"/>
            <rect x="64" y="56" width="8" height="8" fill="#E8E2D5"/>
            <rect x="72" y="56" width="8" height="8" fill="#8BA3B8"/>
            <rect x="80" y="56" width="8" height="8" fill="#6B8294"/>
            <!-- Fila 7 (y=64) -->
            <rect class="bird-wing" x="16" y="64" width="8" height="8" fill="#6B8294"/>
            <rect class="bird-wing" x="24" y="64" width="8" height="8" fill="#8BA3B8"/>
            <rect x="32" y="64" width="8" height="8" fill="#E8E2D5"/>
            <rect x="40" y="64" width="8" height="8" fill="#E8E2D5"/>
            <rect x="48" y="64" width="8" height="8" fill="#E8E2D5"/>
            <rect x="56" y="64" width="8" height="8" fill="#E8E2D5"/>
            <rect x="64" y="64" width="8" height="8" fill="#8BA3B8"/>
            <rect x="72" y="64" width="8" height="8" fill="#6B8294"/>
            <!-- Fila 8 (y=72) -->
            <rect x="24" y="72" width="8" height="8" fill="#8BA3B8"/>
            <rect x="32" y="72" width="8" height="8" fill="#E8E2D5"/>
            <rect x="40" y="72" width="8" height="8" fill="#E8E2D5"/>
            <rect x="48" y="72" width="8" height="8" fill="#E8E2D5"/>
            <rect x="56" y="72" width="8" height="8" fill="#8BA3B8"/>
            <rect x="64" y="72" width="8" height="8" fill="#6B8294"/>
            <!-- Fila 9 (y=80): patitas -->
            <rect x="32" y="80" width="8" height="8" fill="#8BA3B8"/>
            <rect x="40" y="80" width="8" height="8" fill="#8BA3B8"/>
            <rect x="48" y="80" width="8" height="8" fill="#6B8294"/>
            <!-- Patitas (y=88) -->
            <rect x="32" y="88" width="8" height="4" fill="#C9A86A"/>
            <rect x="48" y="88" width="8" height="4" fill="#C9A86A"/>
          </svg>
        </button>

        <!-- Welcome -->
        <h1 class="landing-title">Lee tus libros, sin leerlos</h1>
        <p class="landing-subtitle">Escanea cualquier libro físico y escúchalo con tu voz favorita. Todo en tu dispositivo.</p>

        <!-- Ventajas (3 cards glass) -->
        <div class="landing-benefits">
          <div class="landing-benefit" style="--delay:0ms">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <h3>Escanea</h3>
            <p>Foto a las páginas</p>
          </div>
          <div class="landing-benefit" style="--delay:120ms">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 010 7.07"/>
              <path d="M19.07 4.93a10 10 0 010 14.14"/>
            </svg>
            <h3>Escucha</h3>
            <p>Voces naturales</p>
          </div>
          <div class="landing-benefit" style="--delay:240ms">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              <circle cx="9" cy="11" r="0.8" fill="currentColor"/>
              <circle cx="13" cy="11" r="0.8" fill="currentColor"/>
              <circle cx="17" cy="11" r="0.8" fill="currentColor"/>
            </svg>
            <h3>Pregunta</h3>
            <p>Chat con tu libro</p>
          </div>
        </div>

        <!-- CTAs -->
        <div class="landing-actions">
          <button class="btn btn-primary landing-btn" onclick="App.go('tutorial')">Comenzar</button>
          <button class="btn btn-ghost landing-btn-secondary" onclick="App.go('library')">Ya tengo libros</button>
        </div>

        <div class="landing-ambient" id="landing-ambient" style="display:none"></div>
      </div>
    </div>
  </div>

  <script src="/lib/tesseract/tesseract.min.js"></script>
  <script src="/js/limits.js"></script>
  <script src="/js/microcopy.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/quota.js"></script>
  <script src="/js/tesseract-ocr.js"></script>
  <script src="/js/pdf-extract.js"></script>
  <script src="/js/tutorial.js"></script>
  <script src="/js/scanner.js"></script>
  <script src="/js/ocr.js"></script>
  <script src="/js/chapters.js"></script>
  <script src="/js/processor.js"></script>
  <script src="/js/voices.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/book-io.js"></script>
  <script src="/js/library.js"></script>
  <script src="/js/paywall.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
