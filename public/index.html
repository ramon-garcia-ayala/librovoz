        <svg class="landing-logo" viewBox="0 0 120 120" width="120" height="120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Libro abierto -->

        <button class="btn btn-primary landing-btn" onclick="App.go('tutorial')">Comenzar</button>
        <div class="landing-ambient" id="landing-ambient" style="display:none"></div>
