<div class="chat-modal" id="chat-modal">
  <div class="chat-backdrop" onclick="Chat.close()"></div>
  <div class="chat-sheet">
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-header-title">Pregunta sobre el libro</div>
        <div class="chat-header-counter" id="chat-counter">—</div>
      </div>
      <button class="chat-close" onclick="Chat.close()" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div class="chat-body" id="chat-body"></div>

    <form class="chat-footer" id="chat-form">
      <input
        type="text"
        id="chat-input"
        class="chat-input"
        placeholder="Escribe tu pregunta..."
        autocomplete="off"
        maxlength="500">
      <button type="submit" class="chat-send" aria-label="Enviar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </form>
  </div>
</div>
