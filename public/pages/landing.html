<div class="landing">
  <div class="landing-content fade-in">

    <!-- Mascota: pajarito pixel-art parado sobre libro abierto, leyendo -->

      <svg class="landing-bird-svg" viewBox="0 0 160 168" width="160" height="168" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">

        <!-- ── Sombra bajo el libro ─────────────────────────────────────── -->
        <ellipse cx="80" cy="156" rx="55" ry="3.5" fill="rgba(24,28,38,0.10)"/>

        <!-- ── Libro abierto ────────────────────────────────────────────── -->
        <g class="bird-book">
          <!-- Tapa/fondo izquierdo -->
          <path d="M22 108 Q22 104 26 104 H78 V148 H26 Q22 148 22 144 Z" fill="#9D6E48"/>
          <!-- Tapa/fondo derecho -->
          <path d="M82 104 H134 Q138 104 138 108 V144 Q138 148 134 148 H82 Z" fill="#9D6E48"/>
          <!-- Página izquierda -->
          <rect x="26" y="106" width="50" height="40" fill="#FAF5E6"/>
          <!-- Página derecha -->
          <rect x="84" y="106" width="50" height="40" fill="#FAF5E6"/>
          <!-- Lomo (centro) -->
          <rect x="78" y="104" width="4" height="44" fill="#6B4A30"/>
          <!-- Líneas de texto página izquierda -->
          <rect x="30" y="112" width="40" height="1.5" fill="#C8C0B0"/>
          <rect x="30" y="118" width="36" height="1.5" fill="#C8C0B0"/>
          <rect x="30" y="124" width="40" height="1.5" fill="#C8C0B0"/>
          <rect x="30" y="130" width="32" height="1.5" fill="#C8C0B0"/>
          <rect x="30" y="136" width="38" height="1.5" fill="#C8C0B0"/>
          <rect x="30" y="142" width="28" height="1.5" fill="#C8C0B0"/>
          <!-- Líneas de texto página derecha -->
          <rect x="88" y="112" width="40" height="1.5" fill="#C8C0B0"/>
          <rect x="88" y="118" width="36" height="1.5" fill="#C8C0B0"/>
          <rect x="88" y="124" width="40" height="1.5" fill="#C8C0B0"/>
          <rect x="88" y="130" width="32" height="1.5" fill="#C8C0B0"/>
          <rect x="88" y="136" width="38" height="1.5" fill="#C8C0B0"/>
          <rect x="88" y="142" width="28" height="1.5" fill="#C8C0B0"/>
          <!-- Página que se gira (rect que hace flip cada N segundos) -->
          <rect class="bird-book-page-flip" x="84" y="106" width="50" height="40" fill="#FAF5E6" stroke="#D6CFB8" stroke-width="0.5"/>
          <!-- Líneas en la página que se gira (acompañan al flip) -->
          <g class="bird-book-page-flip">
            <rect x="88" y="112" width="40" height="1.5" fill="#C8C0B0"/>
            <rect x="88" y="118" width="36" height="1.5" fill="#C8C0B0"/>
            <rect x="88" y="124" width="40" height="1.5" fill="#C8C0B0"/>
            <rect x="88" y="130" width="32" height="1.5" fill="#C8C0B0"/>
            <rect x="88" y="136" width="38" height="1.5" fill="#C8C0B0"/>
          </g>
        </g>

        <!-- ── Pajarito (grupo que se mueve / salta) ──────────────────── -->
        <g class="bird-group">
          <!-- Cuerpo principal -->
          <rect x="56" y="20" width="8" height="8" fill="#8BA3B8"/>
          <rect x="64" y="20" width="8" height="8" fill="#A8BCD0"/>
          <rect x="72" y="20" width="8" height="8" fill="#8BA3B8"/>
          <rect x="80" y="20" width="8" height="8" fill="#8BA3B8"/>

          <rect x="48" y="28" width="8" height="8" fill="#8BA3B8"/>
          <rect x="56" y="28" width="8" height="8" fill="#A8BCD0"/>
          <rect x="64" y="28" width="8" height="8" fill="#A8BCD0"/>
          <rect x="72" y="28" width="8" height="8" fill="#8BA3B8"/>
          <rect x="80" y="28" width="8" height="8" fill="#8BA3B8"/>
          <rect x="88" y="28" width="8" height="8" fill="#6B8294"/>

          <!-- Ojos (mirando hacia abajo al libro) -->
          <rect x="40" y="36" width="8" height="8" fill="#8BA3B8"/>
          <rect x="48" y="36" width="8" height="8" fill="#A8BCD0"/>
          <rect class="bird-eye" x="56" y="36" width="8" height="8" fill="#FFFFFF"/>
          <rect class="bird-eye-pupil" x="60" y="40" width="4" height="4" fill="#181C26"/>
          <rect x="64" y="36" width="8" height="8" fill="#8BA3B8"/>
          <rect class="bird-eye" x="72" y="36" width="8" height="8" fill="#FFFFFF"/>
          <rect class="bird-eye-pupil" x="76" y="40" width="4" height="4" fill="#181C26"/>
          <rect x="80" y="36" width="8" height="8" fill="#6B8294"/>
          <rect x="88" y="36" width="8" height="8" fill="#6B8294"/>

          <!-- Pico (apuntando al libro, abajo) -->
          <rect x="40" y="44" width="8" height="8" fill="#8BA3B8"/>
          <rect x="48" y="44" width="8" height="8" fill="#A8BCD0"/>
          <rect x="56" y="44" width="8" height="8" fill="#8BA3B8"/>
          <rect x="64" y="44" width="8" height="8" fill="#C9A86A"/>
          <rect x="72" y="44" width="8" height="8" fill="#C9A86A"/>
          <rect x="80" y="44" width="8" height="8" fill="#8BA3B8"/>
          <rect x="88" y="44" width="8" height="8" fill="#6B8294"/>

          <!-- Panza -->
          <rect x="40" y="52" width="8" height="8" fill="#8BA3B8"/>
          <rect x="48" y="52" width="8" height="8" fill="#E8E2D5"/>
          <rect x="56" y="52" width="8" height="8" fill="#E8E2D5"/>
          <rect x="64" y="52" width="8" height="8" fill="#E8E2D5"/>
          <rect x="72" y="52" width="8" height="8" fill="#E8E2D5"/>
          <rect x="80" y="52" width="8" height="8" fill="#8BA3B8"/>
          <rect x="88" y="52" width="8" height="8" fill="#6B8294"/>

          <!-- Ala -->
          <rect class="bird-wing" x="32" y="60" width="8" height="8" fill="#6B8294"/>
          <rect class="bird-wing" x="40" y="60" width="8" height="8" fill="#8BA3B8"/>
          <rect x="48" y="60" width="8" height="8" fill="#E8E2D5"/>
          <rect x="56" y="60" width="8" height="8" fill="#E8E2D5"/>
          <rect x="64" y="60" width="8" height="8" fill="#E8E2D5"/>
          <rect x="72" y="60" width="8" height="8" fill="#E8E2D5"/>
          <rect x="80" y="60" width="8" height="8" fill="#E8E2D5"/>
          <rect x="88" y="60" width="8" height="8" fill="#8BA3B8"/>

          <rect class="bird-wing" x="32" y="68" width="8" height="8" fill="#6B8294"/>
          <rect class="bird-wing" x="40" y="68" width="8" height="8" fill="#8BA3B8"/>
          <rect x="48" y="68" width="8" height="8" fill="#E8E2D5"/>
          <rect x="56" y="68" width="8" height="8" fill="#E8E2D5"/>
          <rect x="64" y="68" width="8" height="8" fill="#E8E2D5"/>
          <rect x="72" y="68" width="8" height="8" fill="#E8E2D5"/>
          <rect x="80" y="68" width="8" height="8" fill="#8BA3B8"/>

          <rect x="40" y="76" width="8" height="8" fill="#8BA3B8"/>
          <rect x="48" y="76" width="8" height="8" fill="#E8E2D5"/>
          <rect x="56" y="76" width="8" height="8" fill="#E8E2D5"/>
          <rect x="64" y="76" width="8" height="8" fill="#E8E2D5"/>
          <rect x="72" y="76" width="8" height="8" fill="#8BA3B8"/>
          <rect x="80" y="76" width="8" height="8" fill="#6B8294"/>

          <rect x="48" y="84" width="8" height="8" fill="#8BA3B8"/>
          <rect x="56" y="84" width="8" height="8" fill="#8BA3B8"/>
          <rect x="64" y="84" width="8" height="8" fill="#6B8294"/>

          <!-- Patitas (paradas sobre el libro) -->
          <rect x="52" y="92" width="4" height="12" fill="#C9A86A"/>
          <rect x="68" y="92" width="4" height="12" fill="#C9A86A"/>
        </g>
      </svg>
    </button>

    <h1 class="landing-title">Lee tus libros, sin leerlos</h1>
    <p class="landing-subtitle">Escanea cualquier libro físico y escúchalo con tu voz favorita. Todo en tu dispositivo.</p>

    <div class="landing-benefits">
      <div class="landing-benefit" style="--delay:0ms">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>

    </div>

    <div class="landing-actions">
      <button class="btn btn-primary landing-btn" onclick="App.go('tutorial')">Comenzar</button>
