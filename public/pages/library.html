<div class="library">
  <div class="library-header">
    <div class="library-header-row">
      <h1 class="library-title">Mi Biblioteca</h1>
      <button class="library-import-btn" onclick="Library.openImportPicker()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Importar</span>
      </button>
    </div>
    <input type="file" id="library-import-input" accept=".json,application/json" style="display:none">
    <div class="library-ambient microcopy microcopy-ambient" id="library-ambient" style="display:none"></div>
    <div class="library-quota" id="library-quota" style="display:none"></div>
  </div>

  <div class="library-grid" id="library-grid"></div>

  <div class="library-empty" id="library-empty" style="display:none">
    <svg viewBox="0 0 80 80" width="80" height="80" fill="none">
      <path d="M16 65V20c0-2 2-4 4-4h16c4 0 8 2 8 5v46c0-2-3-4-6-4H20c-2 0-4 2-4 4z" fill="#007AFF" opacity="0.15"/>
      <path d="M64 65V20c0-2-2-4-4-4H44c-4 0-8 2-8 5v46c0-2 3-4 6-4h18c2 0 4 2 4 4z" fill="#007AFF" opacity="0.25"/>
      <line x1="28" y1="30" x2="36" y2="30" stroke="#007AFF" stroke-width="2" opacity="0.4"/>
      <line x1="28" y1="36" x2="34" y2="36" stroke="#007AFF" stroke-width="2" opacity="0.3"/>
      <line x1="44" y1="30" x2="52" y2="30" stroke="#007AFF" stroke-width="2" opacity="0.4"/>
      <line x1="44" y1="36" x2="50" y2="36" stroke="#007AFF" stroke-width="2" opacity="0.3"/>
    </svg>
    <p>Aún no tienes libros guardados</p>
    <button class="btn btn-primary" onclick="App.go('scanner')">Escanear un libro</button>
  </div>
</div>
