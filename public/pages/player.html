<div class="player">
  <!-- Botón flotante: chat con IA sobre el libro -->
  <button class="player-chat-btn" onclick="Chat.open()" title="Pregunta sobre el libro">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      <circle cx="9" cy="11" r="0.8" fill="currentColor"/>
      <circle cx="13" cy="11" r="0.8" fill="currentColor"/>
      <circle cx="17" cy="11" r="0.8" fill="currentColor"/>
    </svg>
  </button>

  <!-- Header -->
  <div class="player-header">
    <button class="player-back" onclick="App.go('landing')">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <div class="player-cover" id="player-cover"></div>
    <div class="player-info">
      <h2 class="player-book-title" id="player-title">Cargando...</h2>
      <p class="player-chapter" id="player-chapter"></p>
    </div>
  </div>

  <!-- Tabs de capítulos -->
  <div class="player-chapters" id="player-chapters-tabs"></div>

  <!-- Zona de lyrics -->
  <div class="lyrics-container" id="player-lyrics">
    <div id="lyrics-container"></div>
    <button class="player-live-btn" id="btn-live" onclick="Player.scrollToLive()">Volver al en vivo</button>
  </div>

  <!-- Controles -->
  <div class="player-controls">
    <div class="player-progress">
      <div class="player-progress-bar">
        <div class="player-progress-fill" id="player-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="player-transport">
      <button class="player-btn-skip" onclick="Player.prevChapter()">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
        </svg>
      </button>
      <button class="player-btn-play" id="btn-play" onclick="Player.togglePlay()">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor" id="icon-play">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="player-btn-skip" onclick="Player.nextChapter()">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/>
        </svg>
      </button>
    </div>
    <div class="player-secondary">
      <button class="player-speed" id="btn-speed" onclick="Player.cycleSpeed()">1x</button>
      <span class="player-chapter" style="font-size:12px;opacity:0.5" id="player-chapter-count"></span>
    </div>
  </div>
</div>
