<div class="player">
  <!-- Header glass: back, cover, info, chat -->
  <header class="player-header">
    <button class="player-back" onclick="App.go('landing')" aria-label="Volver">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <div class="player-cover" id="player-cover"></div>
    <div class="player-info">
      <h2 class="player-book-title" id="player-title">Cargando...</h2>
      <p class="player-chapter" id="player-chapter"></p>
    </div>
    <button class="player-chat-btn" onclick="Chat.open()" title="Pregunta sobre el libro" aria-label="Chat sobre el libro">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        <circle cx="9" cy="11" r="0.8" fill="currentColor"/>
        <circle cx="13" cy="11" r="0.8" fill="currentColor"/>
        <circle cx="17" cy="11" r="0.8" fill="currentColor"/>
      </svg>
    </button>
  </header>

  <!-- Tabs de capítulos (scroll horizontal) -->
  <nav class="player-chapters" id="player-chapters-tabs" aria-label="Capítulos"></nav>

  <!-- Zona de lyrics (ocupa todo el espacio entre header y controls) -->
  <section class="lyrics-container" id="player-lyrics">
    <div class="lyrics-inner" id="lyrics-container"></div>
  </section>

  <!-- Pill "Volver al en vivo": anclado justo sobre los controls -->
  <button class="player-live-btn" id="btn-live" onclick="Player.scrollToLive()">
    Volver al en vivo
  </button>

  <!-- Controles glass abajo -->
  <footer class="player-controls">
    <div class="player-progress">
      <div class="player-progress-bar">
        <div class="player-progress-fill" id="player-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="player-transport">
      <button class="player-btn-skip player-btn-chapter" onclick="Player.prevChapter()" title="Capítulo anterior" aria-label="Capítulo anterior">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
        </svg>
      </button>
      <button class="player-btn-skip player-btn-seek" onclick="Player.rewind(10)" title="Atrás 10 segundos" aria-label="Atrás 10 segundos">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
          <polyline points="3 3 3 8 8 8"/>
          <text x="12" y="16" font-size="7" font-weight="600" fill="currentColor" stroke="none" text-anchor="middle">10</text>
        </svg>
      </button>
      <button class="player-btn-play" id="btn-play" onclick="Player.togglePlay()" aria-label="Reproducir o pausar">
        <svg viewBox="0 0 24 24" width="34" height="34" fill="currentColor" id="icon-play">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="player-btn-skip player-btn-seek" onclick="Player.forward(10)" title="Adelante 10 segundos" aria-label="Adelante 10 segundos">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 11-9-9 9.75 9.75 0 016.74 2.74L21 8"/>
          <polyline points="21 3 21 8 16 8"/>
          <text x="12" y="16" font-size="7" font-weight="600" fill="currentColor" stroke="none" text-anchor="middle">10</text>
        </svg>
      </button>
      <button class="player-btn-skip player-btn-chapter" onclick="Player.nextChapter()" title="Capítulo siguiente" aria-label="Capítulo siguiente">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/>
        </svg>
      </button>
    </div>
    <div class="player-secondary">
      <span class="player-chapter-count" id="player-chapter-count"></span>
      <button class="player-speed" id="btn-speed" onclick="Player.cycleSpeed()">1x</button>
    </div>
  </footer>
</div>
