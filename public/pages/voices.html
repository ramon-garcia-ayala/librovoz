<div class="voices">
  <h2 class="voices-title">Elige una voz</h2>
  <p class="voices-subtitle">Selecciona la voz con la que quieres escuchar tu libro</p>

  <div class="voices-grid" id="voices-grid">
    <!-- Las cards se generan dinámicamente -->
    <div class="voices-loading">
      <p>Buscando voces disponibles...</p>
    </div>
  </div>

  <button class="btn btn-primary voices-continue" id="btn-voices-continue" style="display:none" onclick="Voices.confirm()">Continuar</button>
</div>
